name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: |
            - args: [ '--frozen-lockfile' ]
      - uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          node-version: lts/*
      - name: Build test
        run: pnpm build
      - uses: actions/upload-artifact@v6
        with:
          path: dist/*
