name: Release

on:
  push:
    tags: [ '*' ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: lts/*
      - name: install deps and build
        run: |
          npm install
          npm run build
      - uses: TheDoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: 'plugin.zip'
      - uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/plugin.zip'
          draft: true
