name: Release

on:
  push:
    tags: [ '*' ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: |
            - args: [ '--frozen-lockfile' ]
      - uses: actions/setup-node@v3
        with:
          cache: 'pnpm'
          node-version: lts/*
      - name: Build
        run: pnpm build
      - uses: TheDoctor0/zip-release@0.7.6
        with:
          directory: dist
          filename: 'plugin.zip'
      - uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/plugin.zip'
          draft: true
